services:
  backend:
    build:
      context: ./backend
    environment:
      GETVOCAL_COMPANY_ID: ${GETVOCAL_COMPANY_ID:-r646hBRPFOPkTDVDv5t7}
      GETVOCAL_ASSISTANT_ID: ${GETVOCAL_ASSISTANT_ID:-MD9oQ2s9jUuy9SbQxySV}
      GETVOCAL_STATIC_PHONE_KEY: ${GETVOCAL_STATIC_PHONE_KEY:-LEAD_PHONE_NUMBER}
      GETVOCAL_API_KEY_ID: ${GETVOCAL_API_KEY_ID:?set in .env}
      GETVOCAL_API_KEY_SECRET: ${GETVOCAL_API_KEY_SECRET:?set in .env}
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "81:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
